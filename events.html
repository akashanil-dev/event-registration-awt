<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFest Events | 2026</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Background Elements -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header class="portal-header">
        <a href="index.html" class="logo">TechFest<span class="highlight">26</span></a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="events.html" class="nav-item active">Events</a>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Explore <span>Events</span></h1>

        <!-- Events Grid (Loaded via AJAX) -->
        <div id="eventsContainer" class="events-container">
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </div>

        <!-- Participants Section (Loaded via AJAX) -->
        <section class="participants-section">
            <h2 class="section-title"><i class="fa-solid fa-users"></i> Recent Registrations</h2>
            <div id="participantsGrid" class="participants-grid">
                <!-- Participants loaded dynamically -->
            </div>
        </section>

    </main>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="registrationModal">
        <div class="modal">
            <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>

            <div class="modal-header">
                <h3>Register Now</h3>
                <p id="modalEventTitle">Loading event details...</p>
            </div>

            <!-- Form -->
            <form id="registrationForm" novalidate>
                <input type="hidden" id="eventIdInput" name="eventId">

                <div class="form-group">
                    <label class="form-label" for="participantName">Full Name</label>
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" class="form-input" id="participantName" name="name" placeholder="John Doe"
                        required minlength="3">
                    <div class="form-error" id="nameError">Please enter a valid name (at least 3 characters).</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="participantEmail">Email Address</label>
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" class="form-input" id="participantEmail" name="email"
                        placeholder="john@example.com" required>
                    <div class="form-error" id="emailError">Please enter a valid email address.</div>
                </div>

                <button type="submit" class="submit-btn" id="submitRegistrationBtn">
                    Confirm Registration <i class="fa-solid fa-check"></i>
                </button>
                <div class="form-error" id="serverError" style="text-align:center; margin-top:10px; font-size:1rem;">
                </div>
            </form>

            <!-- Success State -->
            <div class="success-msg" id="successMessage">
                <i class="fa-regular fa-circle-check"></i>
                <h4>Registration Complete!</h4>
                <p>We've saved your spot. See you at the event!</p>
            </div>
        </div>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>

</html>
