<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFest 2026</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="landing-page">

    <!-- Background Elements -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <main class="hero-container">
        <div class="hero-content">
            <h2 class="hero-subtitle">Welcome to the Future</h2>
            <h1 class="hero-title">TechFest <span class="highlight">2026</span></h1>
            <p class="hero-desc">Immerse yourself in three days of innovation, competition, and learning. Discover the
                latest in AI, Web3, Cyber Security, and more. Are you ready to level up?</p>

            <div class="hero-actions">
                <a href="events.html" class="cta-button primary-cta">
                    <span class="cta-text">Enter Portal</span>
                    <i class="fa-solid fa-arrow-right cta-icon"></i>
                </a>
            </div>

            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number">6+</span>
                    <span class="stat-label">Events</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">3</span>
                    <span class="stat-label">Days</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">5K$</span>
                    <span class="stat-label">Prizes</span>
                </div>
            </div>
        </div>

        <div class="hero-illustration">
            <div class="floating-element el-1">
                <i class="fa-solid fa-code"></i>
            </div>
            <div class="floating-element el-2">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="floating-element el-3">
                <i class="fa-brands fa-ethereum"></i>
            </div>
            <div class="main-glow-sphere"></div>
        </div>
    </main>

</body>

</html>
